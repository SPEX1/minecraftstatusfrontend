<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>status</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <script src="./dist/script.js" defer></script>
</head>
<body>
    <main id="serverContainer">
            <img id="serverImage" src="./img/default.svg" alt="defualt-icon">
            <div id="fullServerAdress">
                <h1 id="serverName">Loading...</h1>
                <h2 id="serverAdress"></h2>
            </div>
            <div id="serverStatusUsers">
                <h2 id="serverOnlineUsers">0/0</h2>
                <img id="serverStatus" src="./img/connectionempty.png" alt="connect-status-loading">
            </div>
        <h3 id="serverMotd">Loading...</h3>
    </main>
    <form id="changeServerForm" onsubmit="getServerInformation();return false">
        <input id="serverNameInput" type="text" placeholder="Enter a server adress.">
        <button id="changeServerButton">Submit</button>
    </form>

</body>
</html>
